# OpenClaw Gateway para integração com Innexar Workspace (Coolify / Docker).
# Backend workspace (api.innexar.com.br) usa OPENCLAW_GATEWAY_URL apontando para este serviço.
# Frontend (app.innexar.com.br) carrega a UI via proxy do backend em /api/workspace/openclaw-ui.

services:
  openclaw:
    build: .
    image: openclaw:innexar
    container_name: openclaw
    restart: unless-stopped
    ports:
      - "18789:18789"
    environment:
      NODE_ENV: production
      OPENCLAW_STATE_DIR: /data
      OPENCLAW_CONFIG_PATH: /data/openclaw.json
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
    volumes:
      - openclaw-data:/data
      - ./openclaw.json.example:/data/openclaw.json:ro
    command: [ "node", "openclaw.mjs", "gateway", "--allow-unconfigured", "--bind", "lan", "--port", "18789" ]
    healthcheck:
      interval: 3m
      timeout: 10s
      start_period: 15s
      retries: 3
      test: [ "CMD", "node", "-e", "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))" ]

volumes:
  openclaw-data:
